<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Form</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f4f4;
}
.container-box {
    max-width: 500px;
    margin: 50px auto;
    padding: 20px;
    background: #fff;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container-box">
    <h3 class="text-center mb-3">Registration Form</h3>

    <form id="formData">
        
        <input type="text" class="form-control mb-2" id="fname" placeholder="First Name" required>
        
        <input type="text" class="form-control mb-2" id="lname" placeholder="Last Name" required>

        <input type="date" class="form-control mb-2" id="dob" required>

        <div class="mb-2">
            Gender:
            <input type="radio" name="gender" value="Male" required> Male
            <input type="radio" name="gender" value="Female"> Female
        </div>

        <input type="text" class="form-control mb-2" id="mobile" placeholder="Mobile (10 digits)" required>

        <input type="email" class="form-control mb-2" id="email" placeholder="Email" required>

        <button class="btn btn-primary w-100">Submit</button>
    </form>

    <a href="list.html" class="btn btn-link mt-3 w-100">View Data</a>
</div>

<script>
document.getElementById("formData").addEventListener("submit", function(e){
    e.preventDefault();

    let mobile = document.getElementById("mobile").value;

    if(mobile.length !== 10 || isNaN(mobile)){
        alert("Mobile must be exactly 10 digits");
        return;
    }

    let data = {
        fname: document.getElementById("fname").value,
        lname: document.getElementById("lname").value,
        dob: document.getElementById("dob").value,
        gender: document.querySelector('input[name="gender"]:checked').value,
        mobile: mobile,
        email: document.getElementById("email").value
    };

    // AJAX-like simulation (no reload)
    let users = JSON.parse(localStorage.getItem("users")) || [];
    users.push(data);
    localStorage.setItem("users", JSON.stringify(users));

    alert("Data Saved");
    this.reset();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f4f4;
}
.container-box {
    margin: 30px;
}
</style>
</head>

<body>

<div class="container-box">
    <h3>Stored Data</h3>
    <p><strong>Total Count:</strong> <span id="count"></span></p>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>First</th>
                <th>Last</th>
                <th>DOB</th>
                <th>Gender</th>
                <th>Mobile</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody id="dataList"></tbody>
    </table>

    <a href="form.html" class="btn btn-secondary">Back</a>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

document.getElementById("count").innerText = users.length;

let output = "";

users.forEach(user => {
    output += `
        <tr>
            <td>${user.fname}</td>
            <td>${user.lname}</td>
            <td>${user.dob}</td>
            <td>${user.gender}</td>
            <td>${user.mobile}</td>
            <td>${user.email}</td>
        </tr>
    `;
});

document.getElementById("dataList").innerHTML = output;
</script>

</body>
</html>
