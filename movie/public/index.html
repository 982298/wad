<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Ticket Booking</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
    background-color: #f8f9fa;
}

.card img {
    height: 250px;
    object-fit: cover;
}

.card {
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.booking-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
    </style>
</head>
<body>

<div class="container mt-4">
    <h2 class="text-center mb-4">🎬 Movie Ticket Booking</h2>

    <div class="row">

        <!-- Movie 1 -->
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1200&auto=format&fit=crop"
                class="card-img-top">

                <div class="card-body text-center">
                    <h5>Avengers</h5>
                    <button class="btn btn-primary"
                    onclick="bookTicket('Avengers')">
                    Book Ticket
                    </button>
                </div>
            </div>
        </div>

        <!-- Movie 2 -->
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1200&auto=format&fit=crop"
                class="card-img-top">

                <div class="card-body text-center">
                    <h5>Inception</h5>
                    <button class="btn btn-primary"
                    onclick="bookTicket('Inception')">
                    Book Ticket
                    </button>
                </div>
            </div>
        </div>

        <!-- Movie 3 -->
        <div class="col-md-4 mb-4">
            <div class="card">
                <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=1200&auto=format&fit=crop"
                class="card-img-top">

                <div class="card-body text-center">
                    <h5>Interstellar</h5>
                    <button class="btn btn-primary"
                    onclick="bookTicket('Interstellar')">
                    Book Ticket
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Booking Form -->
    <div class="booking-box mt-5">
        <h4 class="mb-3">Book Your Ticket</h4>

        <form onsubmit="return confirmBooking()">

            <input type="text"
            id="movieName"
            class="form-control mb-3"
            placeholder="Movie Name"
            readonly>

            <input type="text"
            id="userName"
            class="form-control mb-3"
            placeholder="Your Name"
            required>

            <input type="number"
            id="tickets"
            class="form-control mb-3"
            placeholder="Number of Tickets"
            required>

            <button type="submit"
            class="btn btn-success w-100">
            Confirm Booking
            </button>

        </form>
    </div>

</div>

<script>
    function bookTicket(movie) {
    document.getElementById("movieName").value = movie;
}

function confirmBooking() {

    const movie =
    document.getElementById("movieName").value;

    const name =
    document.getElementById("userName").value;

    const tickets =
    document.getElementById("tickets").value;

    alert(
        `Booking Confirmed!\n\nMovie: ${movie}\nName: ${name}\nTickets: ${tickets}`
    );

    return false;
}
</script>
</body>
</html>
