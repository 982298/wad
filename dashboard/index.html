<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colorful Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

    body{
      background: #f4f7fe;
      font-family: Arial, sans-serif;
    }

    /* Sidebar */
    .sidebar{
      min-height:100vh;
      background: linear-gradient(to bottom);
      padding:20px;
    }

    .sidebar h4{
      color:black;
      font-weight:bold;
      margin-bottom:30px;
    }

    .sidebar .nav-link{
      color: black;
      margin-bottom:10px;
      border-radius:10px;
      padding:12px;
      transition:0.3s;
    }

    .sidebar .nav-link:hover{
      background:rgba(255,255,255,0.15);
      color:blue;
    }

    .sidebar .nav-link.active{
      background:white;
      color:#4f46e5;
      font-weight:bold;
    }

    /* Navbar */
    .topbar{
      background:white;
      border-bottom:1px solid #e5e7eb;
    }

    /* Cards */
    .card{
      border:none;
      border-radius:18px;
      color:white;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .users-card{
      background:linear-gradient(135deg,#3b82f6,#2563eb);
    }

    .revenue-card{
      background:linear-gradient(135deg,#10b981,#059669);
    }

    .orders-card{
      background:linear-gradient(135deg,#f59e0b,#d97706);
    }

    /* Table Card */
    .table-card{
      background:white;
      border-radius:18px;
    }

    table tbody tr:hover{
      background:#f8fafc;
    }

    /* Search */
    .search-box{
      border-radius:10px;
      border:1px solid #d1d5db;
      padding:8px 12px;
    }

    .btn-custom{
      background:#4f46e5;
      color:white;
      border:none;
      border-radius:10px;
      padding:8px 16px;
    }

    .btn-custom:hover{
      background:#4338ca;
    }

  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 sidebar">

      <h4>Dashboard</h4>

      <ul class="nav flex-column">

        <li class="nav-item">
          <a class="nav-link active" href="#">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Users</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Orders</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Analytics</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Settings</a>
        </li>

      </ul>

    </div>

    <!-- Main -->
    <div class="col-md-10">

      <!-- Navbar -->
      <nav class="navbar topbar px-4 py-3">

        <h4 class="mb-0 fw-bold">
          Overview
        </h4>

        <form class="d-flex">
          <input class="form-control search-box"
            type="search"
            placeholder="Search">
        </form>

      </nav>

      <div class="p-4">

        <!-- Stats -->
        <div class="row g-4 mb-4">

          <!-- Users -->
          <div class="col-md-4">
            <div class="card users-card shadow p-4">

              <p class="mb-1">Total Users</p>

              <h2 class="fw-bold">
                1,240
              </h2>

            </div>
          </div>

          <!-- Revenue -->
          <div class="col-md-4">
            <div class="card revenue-card shadow p-4">

              <p class="mb-1">Revenue</p>

              <h2 class="fw-bold">
                ₹45,000
              </h2>

            </div>
          </div>

          <!-- Orders -->
          <div class="col-md-4">
            <div class="card orders-card shadow p-4">

              <p class="mb-1">Orders</p>

              <h2 class="fw-bold">
                320
              </h2>

            </div>
          </div>

        </div>

        <!-- Table -->
        <div class="table-card shadow-sm p-4">

          <div class="d-flex justify-content-between align-items-center mb-4">

            <h5 class="fw-bold mb-0">
              Recent Orders
            </h5>

            <button class="btn btn-custom">
              View All
            </button>

          </div>

          <table class="table align-middle">

            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Status</th>
              </tr>
            </thead>

            <tbody>

              <tr>
                <td>#1001</td>
                <td>Rahul Sharma</td>

                <td>
                  <span class="badge bg-success">
                    Completed
                  </span>
                </td>
              </tr>

              <tr>
                <td>#1002</td>
                <td>Priya Verma</td>

                <td>
                  <span class="badge bg-warning text-dark">
                    Pending
                  </span>
                </td>
              </tr>

              <tr>
                <td>#1003</td>
                <td>Amit Patel</td>

                <td>
                  <span class="badge bg-danger">
                    Cancelled
                  </span>
                </td>
              </tr>

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>
</div>

</body>
</html>
