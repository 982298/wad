<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }
        .sidebar {
            height: 100vh;
            background: #343a40;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px;
        }
        .sidebar a:hover {
            background: #495057;
        }
        .card {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Dashboard</a>

        <!-- SEARCH BOX -->
        <form class="d-flex ms-auto">
            <input class="form-control me-2" type="search" placeholder="Search">
            <button class="btn btn-outline-light">Search</button>
        </form>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar p-3">
            <h4>Menu</h4>
            <a href="#">Home</a>
            <a href="#">Dashboard</a>
            <a href="#">Reports</a>
            <a href="#">Users</a>
            <a href="#">Settings</a>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 p-4">

            <!-- CARDS / STATS -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card p-3 bg-primary text-white">
                        <h5>Total Users</h5>
                        <h3>1200</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 bg-success text-white">
                        <h5>Revenue</h5>
                        <h3>₹50,000</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 bg-warning text-white">
                        <h5>Orders</h5>
                        <h3>320</h3>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 bg-danger text-white">
                        <h5>Alerts</h5>
                        <h3>5</h3>
                    </div>
                </div>
            </div>

            <!-- TABLE SECTION -->
            <div class="card p-3">
                <h4>Recent Data</h4>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Sample Item</td>
                            <td>Active</td>
                            <td>2026-05-05</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Another Item</td>
                            <td>Pending</td>
                            <td>2026-05-04</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

</body>
</html>
