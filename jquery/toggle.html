<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>

    <!-- jQuery Mobile CSS -->
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

    <!-- jQuery Mobile JS -->
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

    <style>
        /* Center container */
        .form-container {
            max-width: 400px;   /* reduce width */
            margin: 60px auto;  /* center horizontally + spacing from top */
            padding: 20px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }
    </style>

    <script>
        function submitFeedback() {
            var name = $("#name").val();
            var email = $("#email").val();
            var message = $("#message").val();
            var satisfaction = $("#toggle").val();

            alert(
                "Feedback Submitted!\n\n" +
                "Name: " + name +
                "\nEmail: " + email +
                "\nMessage: " + message +
                "\nSatisfied: " + satisfaction
            );
        }
    </script>
</head>

<body>

<div data-role="page" id="feedbackPage">

    <!-- Header -->
    <div data-role="header" data-theme="b">
        <h1>Feedback Form</h1>
    </div>

    <!-- Content -->
    <div data-role="content">

        <!-- Centered Form Box -->
        <div class="form-container">

            <form>

                <label for="name">Name:</label>
                <input type="text" id="name" placeholder="Enter your name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Enter your email" required>

                <label for="message">Feedback:</label>
                <textarea id="message" placeholder="Write your feedback"></textarea>

                <label for="toggle">Are you satisfied?</label>
                <select id="toggle" data-role="flipswitch">
                    <option value="No">No</option>
                    <option value="Yes">Yes</option>
                </select>

                <button type="button" onclick="submitFeedback()" 
                        class="ui-btn ui-btn-b ui-corner-all">
                    Submit Feedback
                </button>

            </form>

        </div>

    </div>

    <!-- Footer -->
    <div data-role="footer" data-theme="b">
        <h4>© 2026 Feedback App</h4>
    </div>

</div>

</body>
</html>
